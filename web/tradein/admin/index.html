<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Cambridge TCG Trade-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #16a34a;
  --green-light: #dcfce7;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --bg: #f8fafc;
  --card-bg: #ffffff;
  --border: #e5e7eb;
  --text: #1f2937;
  --text-muted: #6b7280;
  --radius: 8px;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Login Screen ────────────────────────────────────────── */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

.login-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  margin: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  text-align: center;
}

.login-logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 4px;
}

.login-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 32px;
}

.login-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}

.login-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(22,163,74,.12);
}

.login-btn {
  width: 100%;
  padding: 10px 0;
  margin-top: 16px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s;
}

.login-btn:hover { background: #15803d; }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }

.login-error {
  margin-top: 12px;
  color: var(--red);
  font-size: 13px;
  min-height: 20px;
}

/* ── Dashboard Shell ─────────────────────────────────────── */
.dashboard { display: none; }
.dashboard.active { display: block; }

.topbar {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.topbar-brand {
  font-size: 16px;
  font-weight: 700;
  color: var(--green);
  white-space: nowrap;
}

.topbar-brand span {
  color: var(--text);
  font-weight: 500;
  margin-left: 4px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topbar-date {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
}

.topbar-date:focus { border-color: var(--green); }

.btn-logout {
  padding: 7px 14px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
}

.btn-logout:hover {
  background: var(--red-light);
  border-color: var(--red);
  color: var(--red);
}

/* ── Main Content ────────────────────────────────────────── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* ── Summary Row ─────────────────────────────────────────── */
.summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.summary-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.summary-card__count {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.2;
}

.summary-card__label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-top: 2px;
}

/* ── Filter Tabs ─────────────────────────────────────────── */
.filter-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.filter-tab {
  padding: 7px 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}

.filter-tab:hover { border-color: var(--green); color: var(--green); }

.filter-tab.active {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

/* ── Submission Cards ────────────────────────────────────── */
.submissions-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.submission-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  cursor: pointer;
  transition: all .15s;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px 16px;
  align-items: center;
}

.submission-card:hover {
  border-color: var(--green);
  box-shadow: 0 2px 8px rgba(22,163,74,.08);
}

.sub-top {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.sub-ref {
  font-weight: 600;
  font-size: 14px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

.sub-customer {
  font-size: 14px;
  color: var(--text);
}

.sub-meta {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.sub-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.sub-total {
  font-weight: 600;
  font-size: 15px;
}

.sub-time {
  font-size: 11px;
  color: var(--text-muted);
}

/* ── Status Badges ───────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .3px;
}

.badge-submitted { background: var(--amber-light); color: var(--amber); }
.badge-received  { background: var(--blue-light);  color: var(--blue); }
.badge-accepted  { background: var(--green-light); color: var(--green); }
.badge-paid      { background: var(--green-light); color: var(--green); }
.badge-rejected  { background: var(--red-light);   color: var(--red); }
.badge-cancelled { background: #f3f4f6;            color: #6b7280; }

/* ── Empty State ─────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state__icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: .4;
}

.empty-state__text {
  font-size: 15px;
}

/* ── Loading Spinner ─────────────────────────────────────── */
.spinner-wrap {
  display: flex;
  justify-content: center;
  padding: 60px 0;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ───────────────────────────────────────────────── */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
  animation: slideIn .25s ease-out;
  max-width: 360px;
}

.toast-success { background: var(--green); }
.toast-error   { background: var(--red); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── Detail Overlay ──────────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 100;
  display: none;
  justify-content: flex-end;
  backdrop-filter: blur(2px);
}

.overlay.active { display: flex; }

.detail-panel {
  background: var(--card-bg);
  width: 100%;
  max-width: 720px;
  height: 100%;
  overflow-y: auto;
  animation: slideInPanel .2s ease-out;
  box-shadow: -4px 0 24px rgba(0,0,0,.1);
}

@keyframes slideInPanel {
  from { transform: translateX(100%); }
  to   { transform: translateX(0); }
}

.detail-header {
  position: sticky;
  top: 0;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
}

.detail-header h2 {
  font-size: 16px;
  font-weight: 700;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

.btn-close {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: all .15s;
}

.btn-close:hover { background: #f3f4f6; }

.detail-body { padding: 24px; }

/* ── Detail Sections ─────────────────────────────────────── */
.detail-section {
  margin-bottom: 24px;
}

.detail-section__title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.info-item label {
  display: block;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .3px;
  margin-bottom: 2px;
}

.info-item span, .info-item a {
  font-size: 14px;
  font-weight: 500;
}

/* ── Items Table ─────────────────────────────────────────── */
.items-table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.items-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.items-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .3px;
  color: var(--text-muted);
  padding: 8px 8px;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}

.items-table td {
  padding: 10px 8px;
  border-bottom: 1px solid #f3f4f6;
  vertical-align: middle;
}

.items-table tr:last-child td { border-bottom: none; }

.items-table tr.adjusted td { background: #fefce8; }

.item-thumb {
  width: 40px;
  height: 56px;
  object-fit: cover;
  border-radius: 4px;
  background: #f3f4f6;
}

.item-name {
  font-weight: 500;
  line-height: 1.3;
}

.item-meta {
  font-size: 11px;
  color: var(--text-muted);
}

.edit-input {
  width: 68px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  font-family: inherit;
  text-align: right;
  outline: none;
}

.edit-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 2px rgba(22,163,74,.12);
}

.edit-input.changed {
  background: #fefce8;
  border-color: var(--amber);
}

.qty-input { width: 50px; text-align: center; }

.btn-remove {
  background: none;
  border: none;
  color: var(--red);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  border-radius: 4px;
  transition: background .15s;
}

.btn-remove:hover { background: var(--red-light); }

/* ── Totals Row ──────────────────────────────────────────── */
.totals-bar {
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 14px;
}

.totals-bar strong { font-weight: 700; }
.totals-bar .diff { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
.totals-bar .diff.lower { color: var(--red); }
.totals-bar .diff.higher { color: var(--green); }

/* ── Action Buttons ──────────────────────────────────────── */
.action-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.btn {
  padding: 8px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn:disabled { opacity: .5; cursor: not-allowed; }

.btn-primary {
  background: var(--green);
  color: #fff;
}

.btn-primary:hover:not(:disabled) { background: #15803d; }

.btn-secondary {
  background: var(--card-bg);
  border-color: var(--border);
  color: var(--text);
}

.btn-secondary:hover:not(:disabled) { background: #f3f4f6; }

.btn-danger {
  background: var(--card-bg);
  border-color: var(--red);
  color: var(--red);
}

.btn-danger:hover:not(:disabled) { background: var(--red-light); }

.btn-blue {
  background: var(--blue);
  color: #fff;
}

.btn-blue:hover:not(:disabled) { background: #1d4ed8; }

/* ── Admin Fields ────────────────────────────────────────── */
.field-group {
  margin-bottom: 16px;
}

.field-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .3px;
  margin-bottom: 4px;
}

.field-group input,
.field-group textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}

.field-group input:focus,
.field-group textarea:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 2px rgba(22,163,74,.12);
}

.field-group textarea {
  resize: vertical;
  min-height: 72px;
}

.save-bar {
  position: sticky;
  bottom: 0;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ── Prompt Modal ────────────────────────────────────────── */
.prompt-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}

.prompt-modal {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 28px;
  width: 100%;
  max-width: 400px;
  margin: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,.15);
}

.prompt-modal h3 {
  font-size: 16px;
  margin-bottom: 12px;
}

.prompt-modal input,
.prompt-modal textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  margin-bottom: 16px;
}

.prompt-modal textarea {
  resize: vertical;
  min-height: 72px;
}

.prompt-modal input:focus,
.prompt-modal textarea:focus {
  border-color: var(--green);
}

.prompt-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 768px) {
  .detail-panel { max-width: 100%; }

  .info-grid { grid-template-columns: 1fr; }

  .submission-card {
    grid-template-columns: 1fr;
  }

  .sub-right { align-items: flex-start; flex-direction: row; gap: 10px; }

  .topbar-inner { flex-wrap: wrap; }
}

@media (max-width: 480px) {
  .summary-row { grid-template-columns: repeat(2, 1fr); }
  .detail-body { padding: 16px; }
  .items-table { font-size: 12px; }
  .edit-input { width: 58px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- ── Login Screen ─────────────────────────────────────── -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">Cambridge TCG</div>
    <div class="login-subtitle">Trade-In Admin Dashboard</div>
    <form id="loginForm">
      <input
        type="password"
        id="loginSecret"
        class="login-input"
        placeholder="Enter admin secret"
        autocomplete="off"
        required
      />
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<!-- ── Dashboard ────────────────────────────────────────── -->
<div id="dashboard" class="dashboard">
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">Cambridge TCG <span>Admin</span></div>
      <div class="topbar-right">
        <input type="date" id="datePicker" class="topbar-date" />
        <button id="btnLogout" class="btn-logout">Logout</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <!-- Summary -->
    <div id="summaryRow" class="summary-row"></div>

    <!-- Filter Tabs -->
    <div id="filterTabs" class="filter-tabs"></div>

    <!-- Submissions List -->
    <div id="submissionsList"></div>
  </main>
</div>

<!-- ── Detail Overlay ───────────────────────────────────── -->
<div id="overlay" class="overlay">
  <div id="detailPanel" class="detail-panel"></div>
</div>

<!-- ── Toast Container ──────────────────────────────────── -->
<div id="toastContainer" class="toast-container"></div>

<script>
// ── Config ──────────────────────────────────────────────────
const API = 'https://tradein-api.cambridgetcg.com';
const S3_BASE = 'https://jp-op-photos.s3.us-east-1.amazonaws.com/hires';

// ── State ───────────────────────────────────────────────────
let adminSecret = '';
let currentDate = '';
let submissions = [];
let fullSubmissions = {};   // cache of full submission data by ref
let activeFilter = 'all';
let refreshTimer = null;
let currentDetailRef = null;

// ── Helpers ─────────────────────────────────────────────────
function getSecret() {
  return sessionStorage.getItem('ctcg_admin_secret') || '';
}

function setSecret(s) {
  sessionStorage.setItem('ctcg_admin_secret', s);
  adminSecret = s;
}

function clearSecret() {
  sessionStorage.removeItem('ctcg_admin_secret');
  adminSecret = '';
}

function formatPrice(n) {
  if (n == null) return '—';
  return '£' + Number(n).toFixed(2);
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day = d.getDate();
  const mon = months[d.getMonth()];
  const year = d.getFullYear();
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  return `${day} ${mon} ${year} ${h}:${m}`;
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function badgeHTML(status) {
  return `<span class="badge badge-${status}">${status}</span>`;
}

function escHTML(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

// ── API Calls ───────────────────────────────────────────────
async function apiGet(path) {
  const res = await fetch(API + path, {
    headers: { 'X-Admin-Secret': adminSecret }
  });
  if (res.status === 401) {
    toast('Session expired — please login again', 'error');
    logout();
    throw new Error('Unauthorized');
  }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function apiPatch(path, body) {
  const res = await fetch(API + path, {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'X-Admin-Secret': adminSecret
    },
    body: JSON.stringify(body)
  });
  if (res.status === 401) {
    toast('Session expired — please login again', 'error');
    logout();
    throw new Error('Unauthorized');
  }
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── Toast ───────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 300);
  }, 3500);
}

// ── Prompt Modal ────────────────────────────────────────────
function promptUser(title, placeholder, isTextarea) {
  return new Promise((resolve) => {
    const backdrop = document.createElement('div');
    backdrop.className = 'prompt-backdrop';
    const inputTag = isTextarea ? 'textarea' : 'input';
    backdrop.innerHTML = `
      <div class="prompt-modal">
        <h3>${escHTML(title)}</h3>
        <${inputTag} id="promptInput" placeholder="${escHTML(placeholder)}" autofocus></${inputTag}>
        <div class="prompt-actions">
          <button class="btn btn-secondary" id="promptCancel">Cancel</button>
          <button class="btn btn-primary" id="promptOk">Confirm</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    const input = backdrop.querySelector('#promptInput');
    input.focus();
    backdrop.querySelector('#promptCancel').onclick = () => { backdrop.remove(); resolve(null); };
    backdrop.querySelector('#promptOk').onclick = () => { backdrop.remove(); resolve(input.value); };
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !isTextarea) { backdrop.remove(); resolve(input.value); }
      if (e.key === 'Escape') { backdrop.remove(); resolve(null); }
    });
    backdrop.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { backdrop.remove(); resolve(null); }
    });
  });
}

// ── Login ───────────────────────────────────────────────────
function initLogin() {
  const saved = getSecret();
  if (saved) {
    adminSecret = saved;
    showDashboard();
    return;
  }
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('dashboard').classList.remove('active');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const secret = document.getElementById('loginSecret').value.trim();
  if (!secret) return;

  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errorEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    // Test the secret by calling an admin endpoint
    adminSecret = secret;
    await apiGet('/admin/submissions?date=' + today());
    setSecret(secret);
    showDashboard();
  } catch (err) {
    adminSecret = '';
    errorEl.textContent = err.message === 'Unauthorized' ? 'Invalid admin secret' : err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

function logout() {
  clearSecret();
  clearInterval(refreshTimer);
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loginSecret').value = '';
  document.getElementById('loginError').textContent = '';
}

document.getElementById('btnLogout').addEventListener('click', logout);

// ── Dashboard ───────────────────────────────────────────────
function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');

  currentDate = today();
  document.getElementById('datePicker').value = currentDate;

  loadSubmissions();
  startAutoRefresh();
}

document.getElementById('datePicker').addEventListener('change', (e) => {
  currentDate = e.target.value;
  loadSubmissions();
});

function startAutoRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => loadSubmissions(true), 60000);
}

async function loadSubmissions(silent) {
  const container = document.getElementById('submissionsList');
  if (!silent) {
    container.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  }

  try {
    const data = await apiGet('/admin/submissions?date=' + currentDate);
    submissions = data.submissions || [];

    // Enrich with full status from individual submissions (index may be stale)
    await enrichSubmissions();

    renderSummary();
    renderFilterTabs();
    renderSubmissions();
  } catch (err) {
    if (!silent) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-state__icon">!</div>
        <div class="empty-state__text">Error: ${escHTML(err.message)}</div>
      </div>`;
    }
  }
}

async function enrichSubmissions() {
  // Fetch full data for each submission to get current status
  const promises = submissions.map(async (sub) => {
    try {
      const full = await apiGet('/admin/submission/' + sub.reference);
      fullSubmissions[sub.reference] = full;
      sub.status = full.status;
      sub.paymentMethod = full.paymentMethod || sub.paymentMethod;
    } catch (e) {
      // keep index data
    }
  });
  await Promise.all(promises);
}

function renderSummary() {
  const counts = { total: submissions.length, submitted: 0, received: 0, accepted: 0, paid: 0, rejected: 0 };
  for (const s of submissions) {
    if (counts[s.status] !== undefined) counts[s.status]++;
  }

  const el = document.getElementById('summaryRow');
  el.innerHTML = [
    { label: 'Total', count: counts.total, color: 'var(--text)' },
    { label: 'Pending', count: counts.submitted, color: 'var(--amber)' },
    { label: 'Received', count: counts.received, color: 'var(--blue)' },
    { label: 'Accepted', count: counts.accepted, color: 'var(--green)' },
    { label: 'Paid', count: counts.paid, color: 'var(--green)' },
    { label: 'Rejected', count: counts.rejected, color: 'var(--red)' },
  ].map(c => `
    <div class="summary-card">
      <div class="summary-card__count" style="color:${c.color}">${c.count}</div>
      <div class="summary-card__label">${c.label}</div>
    </div>
  `).join('');
}

function renderFilterTabs() {
  const statuses = ['all', 'submitted', 'received', 'accepted', 'paid', 'rejected'];
  const labels = { all: 'All', submitted: 'Pending', received: 'Received', accepted: 'Accepted', paid: 'Paid', rejected: 'Rejected' };

  const el = document.getElementById('filterTabs');
  el.innerHTML = statuses.map(s => {
    const count = s === 'all' ? submissions.length : submissions.filter(sub => sub.status === s).length;
    return `<button class="filter-tab ${activeFilter === s ? 'active' : ''}" data-filter="${s}">${labels[s]} (${count})</button>`;
  }).join('');

  el.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-tab');
    if (!btn) return;
    activeFilter = btn.dataset.filter;
    renderFilterTabs();
    renderSubmissions();
  });
}

function renderSubmissions() {
  const container = document.getElementById('submissionsList');
  let filtered = submissions;
  if (activeFilter !== 'all') {
    filtered = submissions.filter(s => s.status === activeFilter);
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state__icon">📋</div>
        <div class="empty-state__text">No submissions ${activeFilter !== 'all' ? 'with status "' + activeFilter + '"' : ''} for ${currentDate}</div>
      </div>`;
    return;
  }

  // Sort by newest first
  filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  container.innerHTML = '<div class="submissions-list">' + filtered.map(s => {
    const total = s.paymentMethod === 'cash' ? s.cashTotal : s.creditTotal;
    const label = s.paymentMethod === 'cash' ? 'cash' : 'credit';
    return `
      <div class="submission-card" data-ref="${escHTML(s.reference)}">
        <div>
          <div class="sub-top">
            <span class="sub-ref">${escHTML(s.reference)}</span>
            ${badgeHTML(s.status || 'submitted')}
          </div>
          <div class="sub-customer">${escHTML(s.name)}</div>
          <div class="sub-meta">
            <span>${s.items || '?'} item${s.items !== 1 ? 's' : ''}</span>
            <span>${escHTML(s.paymentMethod)}</span>
            <span>${escHTML(s.deliveryMethod)}</span>
          </div>
        </div>
        <div class="sub-right">
          <div class="sub-total">${formatPrice(total)} <small style="color:var(--text-muted);font-weight:400">${label}</small></div>
          <div class="sub-time">${timeAgo(s.createdAt)}</div>
        </div>
      </div>
    `;
  }).join('') + '</div>';

  // Click handler
  container.querySelectorAll('.submission-card').forEach(card => {
    card.addEventListener('click', () => openDetail(card.dataset.ref));
  });
}

// ── Detail Panel ────────────────────────────────────────────
async function openDetail(ref) {
  currentDetailRef = ref;
  const overlay = document.getElementById('overlay');
  const panel = document.getElementById('detailPanel');

  overlay.classList.add('active');
  panel.innerHTML = '<div class="spinner-wrap" style="margin-top:40vh"><div class="spinner"></div></div>';

  try {
    const sub = await apiGet('/admin/submission/' + ref);
    fullSubmissions[ref] = sub;
    renderDetail(sub);
  } catch (err) {
    panel.innerHTML = `<div class="detail-header"><h2>Error</h2>
      <button class="btn-close" onclick="closeDetail()">&times;</button></div>
      <div class="detail-body"><p>Failed to load: ${escHTML(err.message)}</p></div>`;
  }
}

function closeDetail() {
  currentDetailRef = null;
  document.getElementById('overlay').classList.remove('active');
  // Refresh list to pick up any changes
  loadSubmissions(true);
}

// Close overlay when clicking backdrop
document.getElementById('overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeDetail();
});

// Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('overlay').classList.contains('active')) {
    closeDetail();
  }
});

function renderDetail(sub) {
  const panel = document.getElementById('detailPanel');
  const paymentTotal = sub.paymentMethod === 'cash' ? 'Cash' : 'Credit';

  // Track edited state
  const editState = {
    items: sub.items.map(item => ({
      ...item,
      _origQty: item.quantity,
      _origCash: item.cashUnitPrice,
      _origCredit: item.creditUnitPrice,
      _removed: false
    })),
    adminNote: sub.adminNote || '',
    trackingNumber: sub.trackingNumber || '',
    paymentReference: sub.paymentReference || ''
  };

  panel.innerHTML = `
    <div class="detail-header">
      <div style="display:flex;align-items:center;gap:12px">
        <h2>${escHTML(sub.reference)}</h2>
        ${badgeHTML(sub.status)}
      </div>
      <button class="btn-close" id="btnCloseDetail">&times;</button>
    </div>
    <div class="detail-body">
      <!-- Customer Info -->
      <div class="detail-section">
        <div class="detail-section__title">Customer</div>
        <div class="info-grid">
          <div class="info-item">
            <label>Name</label>
            <span>${escHTML(sub.customerName)}</span>
          </div>
          <div class="info-item">
            <label>Email</label>
            <a href="mailto:${escHTML(sub.customerEmail)}">${escHTML(sub.customerEmail)}</a>
          </div>
          <div class="info-item">
            <label>Phone</label>
            <span>${sub.customerPhone ? escHTML(sub.customerPhone) : '—'}</span>
          </div>
          <div class="info-item">
            <label>Payment</label>
            <span>${escHTML(sub.paymentMethod)}</span>
          </div>
          <div class="info-item">
            <label>Delivery</label>
            <span>${escHTML(sub.deliveryMethod)}</span>
          </div>
          <div class="info-item">
            <label>Submitted</label>
            <span>${formatDate(sub.createdAt)}</span>
          </div>
          ${sub.notes ? `<div class="info-item" style="grid-column:1/-1">
            <label>Customer Notes</label>
            <span>${escHTML(sub.notes)}</span>
          </div>` : ''}
          ${sub.bankDetails ? `<div class="info-item" style="grid-column:1/-1">
            <label>Bank Details</label>
            <span>${escHTML(sub.bankDetails)}</span>
          </div>` : ''}
        </div>
      </div>

      <!-- Status Actions -->
      <div class="detail-section">
        <div class="detail-section__title">Actions</div>
        <div class="action-bar" id="actionBar"></div>
      </div>

      <!-- Items -->
      <div class="detail-section">
        <div class="detail-section__title">Items (${sub.items.length})</div>
        <div class="items-table-wrap">
          <table class="items-table">
            <thead>
              <tr>
                <th></th>
                <th>Card</th>
                <th>Qty</th>
                <th>Cash £</th>
                <th>Credit £</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Totals -->
      <div class="detail-section">
        <div id="totalsBar" class="totals-bar"></div>
      </div>

      <!-- Admin Fields -->
      <div class="detail-section">
        <div class="detail-section__title">Admin Fields</div>
        <div class="field-group">
          <label>Admin Note</label>
          <textarea id="fieldAdminNote" placeholder="Internal note...">${escHTML(sub.adminNote || '')}</textarea>
        </div>
        <div class="info-grid">
          <div class="field-group">
            <label>Tracking Number</label>
            <input type="text" id="fieldTracking" value="${escHTML(sub.trackingNumber || '')}" placeholder="e.g. RM123456789GB" />
          </div>
          <div class="field-group">
            <label>Payment Reference</label>
            <input type="text" id="fieldPaymentRef" value="${escHTML(sub.paymentReference || '')}" placeholder="e.g. bank ref" />
          </div>
        </div>
      </div>
    </div>

    <!-- Save Bar -->
    <div class="save-bar">
      <button class="btn btn-secondary" id="btnCancelDetail">Cancel</button>
      <button class="btn btn-primary" id="btnSave">Save Changes</button>
    </div>
  `;

  // Close button
  panel.querySelector('#btnCloseDetail').addEventListener('click', closeDetail);
  panel.querySelector('#btnCancelDetail').addEventListener('click', closeDetail);

  // Render items
  renderItems(sub, editState);
  renderTotals(sub, editState);
  renderActions(sub, editState);

  // Field sync
  panel.querySelector('#fieldAdminNote').addEventListener('input', (e) => { editState.adminNote = e.target.value; });
  panel.querySelector('#fieldTracking').addEventListener('input', (e) => { editState.trackingNumber = e.target.value; });
  panel.querySelector('#fieldPaymentRef').addEventListener('input', (e) => { editState.paymentReference = e.target.value; });

  // Save button
  panel.querySelector('#btnSave').addEventListener('click', () => saveChanges(sub, editState));
}

function renderItems(sub, editState) {
  const tbody = document.getElementById('itemsBody');
  tbody.innerHTML = editState.items.filter(i => !i._removed).map((item, idx) => {
    const imgUrl = `${S3_BASE}/${item.setCode}/${item.sku}.jpg`;
    const isAdjusted = item.adminAdjusted || item.quantity !== item._origQty || item.cashUnitPrice !== item._origCash || item.creditUnitPrice !== item._origCredit;
    return `
      <tr class="${isAdjusted ? 'adjusted' : ''}" data-sku="${escHTML(item.sku)}">
        <td><img class="item-thumb" src="${imgUrl}" alt="" onerror="this.style.display='none'" loading="lazy" /></td>
        <td>
          <div class="item-name">${escHTML(item.name)}</div>
          <div class="item-meta">${escHTML(item.cardNumber)} · ${escHTML(item.setCode)} · ${escHTML(item.rarity)}${item.isParallel ? ' · Parallel' : ''} · ${escHTML(item.condition || 'NM')}</div>
        </td>
        <td><input type="number" class="edit-input qty-input" data-field="quantity" data-sku="${escHTML(item.sku)}" value="${item.quantity}" min="1" max="99" /></td>
        <td><input type="number" class="edit-input" data-field="cashUnitPrice" data-sku="${escHTML(item.sku)}" value="${item.cashUnitPrice.toFixed(2)}" min="0" step="0.01" /></td>
        <td><input type="number" class="edit-input" data-field="creditUnitPrice" data-sku="${escHTML(item.sku)}" value="${item.creditUnitPrice.toFixed(2)}" min="0" step="0.01" /></td>
        <td><button class="btn-remove" data-sku="${escHTML(item.sku)}" title="Remove item">&times;</button></td>
      </tr>
    `;
  }).join('');

  // Input handlers
  tbody.querySelectorAll('.edit-input').forEach(input => {
    input.addEventListener('input', (e) => {
      const sku = e.target.dataset.sku;
      const field = e.target.dataset.field;
      const item = editState.items.find(i => i.sku === sku);
      if (!item) return;

      const val = parseFloat(e.target.value) || 0;
      item[field] = field === 'quantity' ? Math.max(1, Math.round(val)) : Math.max(0, Math.round(val * 100) / 100);

      // Mark changed
      const orig = field === 'quantity' ? item._origQty : (field === 'cashUnitPrice' ? item._origCash : item._origCredit);
      if (item[field] !== orig) {
        e.target.classList.add('changed');
      } else {
        e.target.classList.remove('changed');
      }

      renderTotals(sub, editState);
    });
  });

  // Remove handlers
  tbody.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const sku = e.currentTarget.dataset.sku;
      const item = editState.items.find(i => i.sku === sku);
      if (item) {
        item._removed = true;
        renderItems(sub, editState);
        renderTotals(sub, editState);
      }
    });
  });
}

function renderTotals(sub, editState) {
  const active = editState.items.filter(i => !i._removed);
  const cashTotal = Math.round(active.reduce((s, i) => s + i.cashUnitPrice * i.quantity, 0) * 100) / 100;
  const creditTotal = Math.round(active.reduce((s, i) => s + i.creditUnitPrice * i.quantity, 0) * 100) / 100;

  const quotedCash = sub.quotedCashTotal;
  const quotedCredit = sub.quotedCreditTotal;

  function diffBadge(current, quoted) {
    if (current === quoted) return '';
    const diff = current - quoted;
    const cls = diff < 0 ? 'lower' : 'higher';
    const sign = diff > 0 ? '+' : '';
    return `<span class="diff ${cls}">(was ${formatPrice(quoted)}, ${sign}${formatPrice(diff)})</span>`;
  }

  const el = document.getElementById('totalsBar');
  el.innerHTML = `
    <div>
      <strong>Cash Total:</strong> ${formatPrice(cashTotal)} ${diffBadge(cashTotal, quotedCash)}
    </div>
    <div>
      <strong>Credit Total:</strong> ${formatPrice(creditTotal)} ${diffBadge(creditTotal, quotedCredit)}
    </div>
    <div>
      <strong>${sub.paymentMethod === 'cash' ? 'Cash' : 'Credit'} (selected):</strong>
      <strong style="font-size:16px">${sub.paymentMethod === 'cash' ? formatPrice(cashTotal) : formatPrice(creditTotal)}</strong>
    </div>
  `;
}

function renderActions(sub, editState) {
  const bar = document.getElementById('actionBar');
  const s = sub.status;
  const btns = [];

  if (s === 'submitted') {
    btns.push(`<button class="btn btn-blue" id="actReceived">Mark Received</button>`);
  }
  if (s === 'submitted' || s === 'received') {
    btns.push(`<button class="btn btn-primary" id="actAccept">Accept</button>`);
  }
  if (s === 'accepted') {
    btns.push(`<button class="btn btn-primary" id="actPaid">Mark Paid</button>`);
  }
  if (s !== 'paid' && s !== 'rejected' && s !== 'cancelled') {
    btns.push(`<button class="btn btn-danger" id="actReject">Reject</button>`);
  }

  bar.innerHTML = btns.join('');

  // Handlers
  const actReceived = bar.querySelector('#actReceived');
  if (actReceived) actReceived.addEventListener('click', async () => {
    await quickAction(sub.reference, { status: 'received' }, editState);
  });

  const actAccept = bar.querySelector('#actAccept');
  if (actAccept) actAccept.addEventListener('click', async () => {
    await quickAction(sub.reference, { status: 'accepted' }, editState);
  });

  const actPaid = bar.querySelector('#actPaid');
  if (actPaid) actPaid.addEventListener('click', async () => {
    const ref = await promptUser('Payment Reference', 'Enter payment reference...', false);
    if (ref === null) return;
    editState.paymentReference = ref;
    document.getElementById('fieldPaymentRef').value = ref;
    await quickAction(sub.reference, { status: 'paid', paymentReference: ref }, editState);
  });

  const actReject = bar.querySelector('#actReject');
  if (actReject) actReject.addEventListener('click', async () => {
    const note = await promptUser('Rejection Note', 'Reason for rejection...', true);
    if (note === null) return;
    editState.adminNote = note;
    document.getElementById('fieldAdminNote').value = note;
    await quickAction(sub.reference, { status: 'rejected', adminNote: note }, editState);
  });
}

async function quickAction(ref, patch, editState) {
  try {
    const result = await apiPatch('/admin/submission/' + ref, patch);
    fullSubmissions[ref] = result;
    toast(`${ref} → ${patch.status}`);
    renderDetail(result);
  } catch (err) {
    toast('Error: ' + err.message, 'error');
  }
}

async function saveChanges(sub, editState) {
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const patch = {};

    // Collect item changes
    const itemPatches = [];
    for (const item of editState.items) {
      if (item._removed) {
        itemPatches.push({ sku: item.sku, quantity: 0 });
      } else if (
        item.quantity !== item._origQty ||
        item.cashUnitPrice !== item._origCash ||
        item.creditUnitPrice !== item._origCredit
      ) {
        itemPatches.push({
          sku: item.sku,
          quantity: item.quantity,
          cashUnitPrice: item.cashUnitPrice,
          creditUnitPrice: item.creditUnitPrice
        });
      }
    }

    if (itemPatches.length) patch.items = itemPatches;
    if (editState.adminNote !== (sub.adminNote || '')) patch.adminNote = editState.adminNote;
    if (editState.trackingNumber !== (sub.trackingNumber || '')) patch.trackingNumber = editState.trackingNumber;
    if (editState.paymentReference !== (sub.paymentReference || '')) patch.paymentReference = editState.paymentReference;

    if (Object.keys(patch).length === 0) {
      toast('No changes to save');
      return;
    }

    const result = await apiPatch('/admin/submission/' + sub.reference, patch);
    fullSubmissions[sub.reference] = result;
    toast('Changes saved');
    renderDetail(result);
  } catch (err) {
    toast('Save failed: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
}

// ── Boot ────────────────────────────────────────────────────
initLogin();
</script>
